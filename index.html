<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f7f5ef">
  <link rel="preconnect" href="https://translate.googleapis.com">
  <link rel="preconnect" href="https://api.deepgram.com">
  <title>高速翻訳</title>
  <style>
    :root {
      color-scheme: light;
      --paper: #f7f5ef;
      --ink: #181817;
      --muted: #6e6a60;
      --line: #ddd8cc;
      --ja: #fff8df;
      --en: #eaf7f5;
      --panel: #fbfaf6;
      --accent: #e24b35;
      --accent-dark: #aa2f22;
      --ok: #127a54;
      --shadow: 0 14px 38px rgba(32, 26, 12, 0.12);
      --bubble-font: clamp(18px, 3vw, 36px);
      --bubble-pad-y: 13px;
      --bubble-pad-x: 15px;
      --control-height: 48px;
      --main-min: 112px;
      --select-min: 112px;
      --icon-min: 48px;
      --button-font: 13px;
      --status-font: 13px;
      --manual-height: 48px;
      --manual-font: 16px;
      --pane-head-min: 58px;
      --pane-head-pad-y: 12px;
      --pane-head-pad-x: clamp(14px, 3vw, 24px);
      --lang-font: clamp(19px, 2.7vw, 32px);
      --feed-gap: 10px;
      --feed-pad: clamp(12px, 2.5vw, 24px);
      --dock-gap: 10px;
      --dock-pad-y: 12px;
      --dock-pad-x: clamp(12px, 2.5vw, 22px);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      min-height: 100dvh;
      margin: 0;
      overflow: hidden;
      background: var(--paper);
      color: var(--ink);
    }

    body {
      display: grid;
      grid-template-rows: 1fr auto;
    }

    button, textarea, input {
      font: inherit;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr minmax(260px, 320px);
      border-bottom: 1px solid var(--line);
    }

    .workspace.history-closed {
      grid-template-columns: 1fr;
    }

    .workspace.history-closed .history-panel {
      display: none;
    }

    .stage {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    .pane {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      border-right: 1px solid var(--line);
    }

    .pane:last-child {
      border-right: 0;
    }

    .pane.ja { background: var(--ja); }
    .pane.en { background: var(--en); }

    .pane-head {
      min-height: var(--pane-head-min);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: var(--pane-head-pad-y) var(--pane-head-pad-x);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .lang-name {
      font-size: var(--lang-font);
      font-weight: 900;
      letter-spacing: 0;
    }

    .lang-sub {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .feed {
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: var(--feed-gap);
      padding: var(--feed-pad);
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .empty {
      margin: auto;
      max-width: 82%;
      color: rgba(24, 24, 23, 0.34);
      font-size: clamp(16px, 2.1vw, 24px);
      font-weight: 800;
      line-height: 1.35;
      text-align: center;
    }

    .bubble {
      width: min(100%, 920px);
      border: 1px solid rgba(0, 0, 0, 0.08);
      background: rgba(255, 255, 255, 0.72);
      box-shadow: 0 6px 18px rgba(32, 26, 12, 0.07);
      padding: var(--bubble-pad-y) var(--bubble-pad-x);
      border-radius: 8px;
      word-break: break-word;
    }

    .bubble.source {
      border-left: 5px solid var(--accent);
    }

    .bubble.pending {
      opacity: 0.68;
    }

    .bubble-text {
      font-size: var(--bubble-font);
      line-height: 1.36;
      font-weight: 850;
      letter-spacing: 0;
    }

    .history-panel {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      background: #f8fbf7;
      border-left: 1px solid var(--line);
    }

    .history-head {
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
    }

    .history-title {
      font-size: 18px;
      font-weight: 900;
    }

    .history-save {
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font-size: 13px;
      font-weight: 900;
      padding: 0 10px;
    }

    .history-list {
      min-height: 0;
      overflow: auto;
      display: flex;
      flex-direction: column;
      gap: 9px;
      padding: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .history-empty {
      margin: auto;
      color: rgba(24, 24, 23, 0.42);
      font-size: 14px;
      font-weight: 800;
      text-align: center;
      line-height: 1.5;
    }

    .history-item {
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.78);
      padding: 10px;
    }

    .history-time {
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
    }

    .history-line {
      margin: 0 0 6px;
      font-size: 13px;
      font-weight: 750;
      line-height: 1.45;
      word-break: break-word;
    }

    .history-line:last-child {
      margin-bottom: 0;
    }

    .dock {
      background: var(--panel);
      box-shadow: var(--shadow);
      padding: var(--dock-pad-y) var(--dock-pad-x) calc(var(--dock-pad-y) + env(safe-area-inset-bottom));
      display: grid;
      gap: var(--dock-gap);
    }

    .topbar {
      display: grid;
      grid-template-columns: auto auto auto auto auto 1fr auto;
      gap: 8px;
      align-items: center;
    }

    .main-button {
      min-width: var(--main-min);
      min-height: var(--control-height);
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font-size: var(--button-font);
      font-weight: 900;
      padding: 0 18px;
    }

    .main-button.on {
      background: var(--accent-dark);
    }

    .icon-button, .select-button {
      min-width: var(--icon-min);
      height: var(--control-height);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
      font-size: var(--button-font);
      font-weight: 900;
      padding: 0 12px;
    }

    .select-button {
      min-width: var(--select-min);
      color: #29251f;
    }

    .scale-controls {
      height: var(--control-height);
      min-width: 120px;
      display: grid;
      grid-template-columns: 34px 1fr 34px;
      align-items: center;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .scale-button {
      width: 100%;
      height: 100%;
      border: 0;
      background: transparent;
      color: var(--ink);
      cursor: pointer;
      font-size: var(--button-font);
      font-weight: 900;
    }

    .scale-button:first-child {
      border-right: 1px solid var(--line);
    }

    .scale-button:last-child {
      border-left: 1px solid var(--line);
    }

    .scale-label {
      color: var(--muted);
      font-size: var(--status-font);
      font-weight: 900;
      text-align: center;
      white-space: nowrap;
    }

    .history-button.on {
      border-color: var(--accent);
      color: var(--accent-dark);
    }

    .status {
      min-width: 0;
      height: var(--control-height);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: var(--status-font);
      font-weight: 850;
      line-height: 1.35;
      padding: 0 8px;
      text-align: center;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status strong {
      color: var(--ok);
    }

    .quick-input {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    textarea {
      min-height: var(--manual-height);
      max-height: 110px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 14px;
      background: #fff;
      color: var(--ink);
      font-size: var(--manual-font);
      line-height: 1.4;
    }

    .send-button {
      min-width: 82px;
      border: 0;
      border-radius: 8px;
      background: #22201c;
      color: #fff;
      cursor: pointer;
      font-size: var(--button-font);
      font-weight: 900;
      padding: 0 14px;
    }

    .history-controls {
      display: grid;
      grid-template-columns: auto minmax(140px, 260px) auto;
      gap: 10px;
      align-items: center;
      color: var(--muted);
      font-size: var(--status-font);
      font-weight: 850;
    }

    .history-controls input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
    }

    @media (max-width: 920px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .workspace.history-open {
        grid-template-rows: minmax(0, 1fr) 220px;
      }

      .history-panel {
        display: none;
      }

      .workspace.history-open .history-panel {
        display: grid;
        min-height: 220px;
        border-left: 0;
        border-top: 1px solid var(--line);
      }
    }

    @media (max-width: 720px) {
      .dock {
        max-width: 100vw;
        overflow: hidden;
        padding: var(--dock-pad-y) var(--dock-pad-x) calc(var(--dock-pad-y) + env(safe-area-inset-bottom));
      }

      .stage {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }

      .pane {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .pane:last-child {
        border-bottom: 0;
      }

      .topbar {
        grid-template-columns: 1fr 1.55fr 0.9fr auto auto;
        gap: 5px;
        justify-content: stretch;
      }

      #engineButton {
        display: none;
      }

      .status {
        grid-column: 1 / -1;
        order: 3;
        min-height: 22px;
        height: auto;
        padding: 0 2px;
        white-space: normal;
      }

      .main-button, .select-button, .icon-button {
        min-width: 0;
        width: 100%;
        height: var(--control-height);
        padding: 0 5px;
        border-radius: 6px;
      }

      #directionButton {
        font-size: var(--button-font);
      }

      #clearButton {
        width: var(--control-height);
        font-size: 0;
      }

      #clearButton::after {
        content: "×";
        font-size: var(--button-font);
      }

      .scale-controls {
        min-width: 78px;
        grid-template-columns: 23px 32px 23px;
        border-radius: 6px;
      }

      .quick-input {
        grid-template-columns: minmax(0, 1fr) 56px;
        gap: 5px;
      }

      .send-button {
        min-width: 0;
        min-height: var(--manual-height);
        border-radius: 6px;
        padding: 0 8px;
      }

      textarea {
        min-height: var(--manual-height);
        max-height: 72px;
        resize: none;
        border-radius: 6px;
        padding: 6px 8px;
      }

      .lang-sub {
        display: none;
      }

      .history-controls {
        grid-template-columns: auto 1fr auto;
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="workspace history-closed" id="workspace">
    <main class="stage" id="stage">
      <section class="pane ja" id="sourcePane" aria-label="Source language pane">
        <header class="pane-head">
          <div class="lang-name" id="sourceName">日本語</div>
          <div class="lang-sub" id="sourceMode">話す言語</div>
        </header>
        <div class="feed" id="sourceFeed">
          <div class="empty" id="sourceEmpty">日本語で話してください</div>
        </div>
      </section>

      <section class="pane en" id="targetPane" aria-label="Target language pane">
        <header class="pane-head">
          <div class="lang-name" id="targetName">English</div>
          <div class="lang-sub" id="targetMode">翻訳結果</div>
        </header>
        <div class="feed" id="targetFeed">
          <div class="empty" id="targetEmpty">英語に翻訳します</div>
        </div>
      </section>
    </main>

    <aside class="history-panel" id="historyPanel" aria-label="Conversation history">
      <header class="history-head">
        <div class="history-title">履歴</div>
        <button class="history-save" type="button" onclick="saveHistorySnapshot(true)">今保存</button>
      </header>
      <div class="history-list" id="historyList">
        <div class="history-empty">履歴をONにすると、日本語だけ指定した間隔で残します</div>
      </div>
    </aside>
  </div>

  <footer class="dock">
    <div class="topbar">
      <button class="main-button" id="startButton" type="button" onclick="toggleListening()">開始</button>
      <button class="select-button" id="engineButton" type="button" onclick="switchEngine()" title="音声認識エンジン">標準</button>
      <button class="select-button" id="directionButton" type="button" onclick="switchDirection()" title="翻訳方向">日本語→英語</button>
      <button class="select-button history-button" id="historyButton" type="button" onclick="toggleHistory()" title="履歴">履歴</button>
      <div class="scale-controls" aria-label="表示サイズ">
        <button class="scale-button" type="button" onclick="changeDisplayScale(-5)" title="表示を小さく">−</button>
        <span class="scale-label" id="scaleLabel">80%</span>
        <button class="scale-button" type="button" onclick="changeDisplayScale(5)" title="表示を大きく">＋</button>
      </div>
      <div class="status" id="status">待機中</div>
      <button class="icon-button" id="clearButton" type="button" onclick="clearFeeds()" title="画面を消去">消去</button>
    </div>
    <div class="quick-input">
      <textarea id="manualText" rows="1" placeholder="日本語を入れてEnter"></textarea>
      <button class="send-button" type="button" onclick="sendManual()">翻訳</button>
    </div>
    <label class="history-controls">
      <span>履歴間隔</span>
      <input id="historyInterval" type="range" min="1" max="5" step="1" value="1" oninput="changeHistoryInterval()">
      <span id="historyIntervalLabel">1分</span>
    </label>
  </footer>

  <script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const LANGS = {
      ja: {
        id: 'ja',
        google: 'ja',
        speech: 'ja-JP',
        deepgram: 'ja',
        name: '日本語',
        pane: 'ja',
        inputPlaceholder: '日本語を入れてEnter',
        sourceEmpty: '日本語で話してください',
        targetEmpty: '日本語に翻訳します'
      },
      en: {
        id: 'en',
        google: 'en',
        speech: 'en-US',
        deepgram: 'en',
        name: 'English',
        pane: 'en',
        inputPlaceholder: 'Englishを入れてEnter',
        sourceEmpty: 'Speak English',
        targetEmpty: '英語に翻訳します'
      }
    };

    const DIRECTIONS = [
      { id: 'ja-en', source: 'ja', target: 'en', label: '日本語→英語' },
      { id: 'en-ja', source: 'en', target: 'ja', label: '英語→日本語' }
    ];

    const workspace = document.getElementById('workspace');
    const sourcePane = document.getElementById('sourcePane');
    const targetPane = document.getElementById('targetPane');
    const sourceFeed = document.getElementById('sourceFeed');
    const targetFeed = document.getElementById('targetFeed');
    const sourceName = document.getElementById('sourceName');
    const targetName = document.getElementById('targetName');
    const sourceMode = document.getElementById('sourceMode');
    const targetMode = document.getElementById('targetMode');
    const statusEl = document.getElementById('status');
    const startButton = document.getElementById('startButton');
    const engineButton = document.getElementById('engineButton');
    const directionButton = document.getElementById('directionButton');
    const historyButton = document.getElementById('historyButton');
    const historyInterval = document.getElementById('historyInterval');
    const historyIntervalLabel = document.getElementById('historyIntervalLabel');
    const historyList = document.getElementById('historyList');
    const manualText = document.getElementById('manualText');
    const scaleLabel = document.getElementById('scaleLabel');
    const mobileQuery = window.matchMedia('(max-width: 720px)');
    const translationCache = new Map();

    let directionIndex = 0;
    let listening = false;
    let engine = 'auto';
    let deepgramAvailable = false;
    let recognition = null;
    let socket = null;
    let audioCtx = null;
    let processor = null;
    let sourceNode = null;
    let inputStream = null;
    let activeTurn = null;
    let interimTimer = null;
    let streamGeneration = 0;
    let historyEnabled = false;
    let historyTimer = null;
    let historyMinutes = 1;
    let lastHistoryTurnIndex = 0;
    let conversationTurns = [];
    let historySnapshots = [];
    let displayScale = 100;
    const targetRenderState = new WeakMap();

    init();

    async function init() {
      loadDisplayScale();
      bindManualInput();
      bindDisplayScaleWatcher();
      loadHistory();
      renderDirection();
      renderHistory();
      setStatus(initialStatusText());
      detectDeepgram().then(() => {
        if (!listening) setStatus(initialStatusText());
      });
      setTimeout(warmTranslateConnection, 250);
    }

    async function detectDeepgram() {
      try {
        const res = await fetch('/api/token', { method: 'POST' });
        const data = await res.json();
        deepgramAvailable = Boolean(data.available && data.key);
      } catch {
        deepgramAvailable = false;
      }
      renderEngine();
    }

    function renderEngine() {
      if (engine === 'auto') {
        engineButton.textContent = deepgramAvailable ? '高速' : '標準';
        return;
      }
      engineButton.textContent = engine === 'deepgram' ? '高速' : '標準';
    }

    async function toggleListening() {
      if (listening) {
        stopListening('停止しました');
        return;
      }
      await startListening();
    }

    async function startListening() {
      const useDeepgram = (engine === 'deepgram' || engine === 'auto') && deepgramAvailable;
      try {
        clearActiveTurn(false);
        setStatus(useDeepgram ? '高速認識を起動中...' : 'ブラウザ認識を起動中...');
        prepareSpeechStart(useDeepgram);

        listening = true;
        startButton.classList.add('on');
        startButton.textContent = '停止';

        if (useDeepgram) {
          await startDeepgram();
        } else {
          startBrowserRecognition();
        }
      } catch (error) {
        stopListening(`エラー: ${error.message}`);
      }
    }

    function stopListening(message = '待機中') {
      listening = false;
      startButton.classList.remove('on');
      startButton.textContent = '開始';
      clearActiveTurn(false);

      if (recognition) {
        recognition.onend = null;
        recognition.onerror = null;
        recognition.onresult = null;
        try { recognition.stop(); } catch {}
        recognition = null;
      }

      if (socket) {
        try {
          if (socket.readyState === WebSocket.OPEN) socket.send(JSON.stringify({ type: 'CloseStream' }));
          socket.close();
        } catch {}
        socket = null;
      }

      if (processor) {
        processor.disconnect();
        processor = null;
      }
      if (sourceNode) {
        sourceNode.disconnect();
        sourceNode = null;
      }
      if (audioCtx) {
        audioCtx.close();
        audioCtx = null;
      }
      if (inputStream) {
        inputStream.getTracks().forEach((track) => track.stop());
        inputStream = null;
      }

      setStatus(message);
    }

    function startBrowserRecognition() {
      if (!SpeechRecognition) {
        throw new Error(speechUnsupportedMessage());
      }

      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = lang(direction().source).speech;
      recognition.maxAlternatives = 1;

      recognition.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; i += 1) {
          const result = event.results[i];
          const text = result[0]?.transcript?.trim();
          if (!text) continue;
          handleTranscript(text, result.isFinal);
        }
      };

      recognition.onerror = (event) => {
        setStatus(speechErrorMessage(event.error));
      };

      recognition.onend = () => {
        if (!listening) return;
        setTimeout(() => {
          if (!listening) return;
          startBrowserRecognition();
        }, 30);
      };

      recognition.start();
      setStatus(`聞き取り中: ${direction().label}`);
    }

    function prepareSpeechStart(useDeepgram) {
      if (!window.isSecureContext) {
        throw new Error('マイクはHTTPSのURLで開いた時だけ使えます');
      }

      if (isIOSDevice() && isStandaloneMode() && !useDeepgram) {
        throw new Error('iPhone/iPadはSafariタブで開いてください');
      }

      if (!useDeepgram && !SpeechRecognition) {
        throw new Error(speechUnsupportedMessage());
      }
    }

    function initialStatusText() {
      if (isIOSDevice()) {
        return deepgramAvailable ? 'iPhone/iPad: Safariで開始→許可' : 'iPhone/iPad: Safariで開始→マイク許可';
      }
      return deepgramAvailable ? '待機中: 高速認識可' : '待機中: ブラウザ音声認識';
    }

    function speechUnsupportedMessage() {
      if (isIOSDevice()) return 'Safariタブで開いてください。ホーム画面版では音声認識できない場合があります';
      return 'このブラウザは音声認識に未対応です。ChromeかSafariで開いてください';
    }

    function speechErrorMessage(errorCode) {
      if (errorCode === 'not-allowed' || errorCode === 'service-not-allowed') {
        return 'マイクが拒否されています。設定でSafariのマイクを許可してください';
      }
      if (errorCode === 'no-speech') return '音声が聞き取れませんでした。もう一度話してください';
      if (errorCode === 'network') return '音声認識の通信エラーです。通信状態を確認してください';
      return `音声認識エラー: ${errorCode}`;
    }

    function microphoneErrorMessage(error) {
      if (error?.name === 'NotAllowedError' || error?.name === 'SecurityError') {
        return 'マイクが拒否されています。Safari/Chromeのマイク許可をONにしてください';
      }
      if (error?.name === 'NotFoundError') return 'マイクが見つかりません';
      if (error?.name === 'NotReadableError') return 'マイクを他のアプリが使用中です';
      return `マイク確認エラー: ${error?.message || 'unknown'}`;
    }

    function isIOSDevice() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    }

    function isStandaloneMode() {
      return window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
    }

    async function startDeepgram() {
      try {
        inputStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        });
      } catch (error) {
        throw new Error(microphoneErrorMessage(error));
      }

      inputStream.getTracks().forEach((track) => {
        track.onended = () => {
          if (listening) stopListening('マイク入力が終了しました');
        };
      });

      const tokenRes = await fetch('/api/token', { method: 'POST' });
      const tokenData = await tokenRes.json();
      if (!tokenData.key) throw new Error('Deepgramキーが取得できませんでした');

      const params = new URLSearchParams({
        model: 'nova-3',
        language: lang(direction().source).deepgram,
        smart_format: 'true',
        punctuate: 'true',
        interim_results: 'true',
        endpointing: '80',
        encoding: 'linear16',
        sample_rate: '16000',
        channels: '1'
      });

      socket = new WebSocket(`wss://api.deepgram.com/v1/listen?${params}`, ['token', tokenData.key]);

      socket.onopen = () => {
        startAudioPipe();
        setStatus(`高速聞き取り中: ${direction().label}`);
      };

      socket.onmessage = async (event) => {
        const raw = event.data instanceof Blob ? await event.data.text() : event.data;
        const data = JSON.parse(raw);
        const text = data.channel?.alternatives?.[0]?.transcript?.trim();
        if (!text || data.type !== 'Results') return;
        handleTranscript(text, Boolean(data.is_final || data.speech_final));
      };

      socket.onclose = (event) => {
        if (listening) stopListening(`高速認識が切断されました (${event.code})`);
      };

      socket.onerror = () => {
        if (listening) setStatus('高速認識エラー');
      };
    }

    function startAudioPipe() {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
      sourceNode = audioCtx.createMediaStreamSource(inputStream);
      processor = audioCtx.createScriptProcessor(2048, 1, 1);

      processor.onaudioprocess = (event) => {
        if (!socket || socket.readyState !== WebSocket.OPEN) return;
        const f32 = event.inputBuffer.getChannelData(0);
        const i16 = new Int16Array(f32.length);
        for (let i = 0; i < f32.length; i += 1) {
          i16[i] = Math.max(-32768, Math.min(32767, f32[i] * 32768));
        }
        socket.send(i16.buffer);
      };

      sourceNode.connect(processor);
      processor.connect(audioCtx.destination);
    }

    function handleTranscript(text, isFinal) {
      const currentDirection = direction();
      const startedAt = activeTurn?.startedAt || performance.now();

      if (!activeTurn) {
        activeTurn = {
          startedAt,
          lastInterimText: '',
          pendingInterimText: '',
          direction: { ...currentDirection },
          generation: streamGeneration,
          sourceEl: addBubble(sourceFeed, 'source', currentDirection.source),
          targetEl: addBubble(targetFeed, 'pending', currentDirection.target)
        };
        resetTargetRenderState(activeTurn.targetEl, activeTurn.generation);
      }

      updateBubble(activeTurn.sourceEl, text);

      if (isFinal) {
        clearTimeout(interimTimer);
        interimTimer = null;
        const targetEl = activeTurn.targetEl;
        const turnDirection = activeTurn.direction;
        const generation = activeTurn.generation;
        translateInto(text, targetEl, startedAt, true, turnDirection, generation);
        activeTurn = null;
        return;
      }

      const targetEl = activeTurn.targetEl;
      const turn = activeTurn;
      const turnDirection = activeTurn.direction;
      const generation = activeTurn.generation;
      turn.pendingInterimText = text;
      if (interimTimer) return;

      interimTimer = setTimeout(() => {
        interimTimer = null;
        if (activeTurn !== turn) return;
        const latestText = turn.pendingInterimText;
        if (turn.lastInterimText === latestText) return;
        if (!shouldTranslateInterim(latestText, turnDirection.source)) return;
        turn.lastInterimText = latestText;
        translateInto(latestText, targetEl, startedAt, false, turnDirection, generation);
      }, interimTranslationDelay());
    }

    function translateInto(text, targetEl, startedAt, final, turnDirection, generation) {
      if (!text.trim()) return;

      const currentDirection = turnDirection || direction();
      const state = ensureTargetRenderState(targetEl, generation);
      if (final) state.finalRequested = true;
      queueTranslation(state, {
        text: text.trim(),
        targetEl,
        startedAt,
        final,
        direction: currentDirection,
        generation
      });
    }

    function queueTranslation(state, job) {
      const pending = state.pendingTranslation;
      if (!pending || job.final || !pending.final || job.text.length >= pending.text.length) {
        state.pendingTranslation = job;
      }
      if (!state.translating) drainTranslationQueue(job.targetEl);
    }

    async function drainTranslationQueue(targetEl) {
      const state = targetRenderState.get(targetEl);
      if (!state || state.translating || !state.pendingTranslation) return;

      const job = state.pendingTranslation;
      state.pendingTranslation = null;
      state.translating = true;

      try {
        await runTranslationJob(job);
      } finally {
        const latestState = targetRenderState.get(targetEl);
        if (!latestState) return;
        latestState.translating = false;
        if (latestState.pendingTranslation) drainTranslationQueue(targetEl);
      }
    }

    async function runTranslationJob(job) {
      const { text, targetEl, startedAt, final, direction: currentDirection, generation } = job;

      try {
        const translated = await translateText(text, currentDirection.source, currentDirection.target);
        if (!canRenderTranslation(targetEl, generation, text, final)) return;

        const ms = Math.round(performance.now() - startedAt);
        const renderState = ensureTargetRenderState(targetEl, generation);
        updateBubble(targetEl, translated);
        targetEl.classList.remove('pending');
        renderState.renderedSourceLength = final ? text.trim().length : Math.max(renderState.renderedSourceLength, text.trim().length);
        renderState.finalRendered = renderState.finalRendered || final;
        scrollBottom(targetEl.parentElement || targetFeed);
        setStatus(`<strong>${ms}ms</strong> ${currentDirection.label}`);

        if (final) {
          conversationTurns.push({
            at: Date.now(),
            direction: currentDirection.label,
            sourceLang: currentDirection.source,
            targetLang: currentDirection.target,
            source: text,
            target: translated,
            japanese: currentDirection.source === 'ja' ? text : translated,
            ms
          });
        }
      } catch (error) {
        if (error.name === 'AbortError') return;
        updateBubble(targetEl, '翻訳に失敗しました');
        setStatus(`翻訳エラー: ${error.message}`);
      }
    }

    function shouldTranslateInterim(text, sourceLang) {
      const normalized = text.trim();
      if (!normalized) return false;
      if (sourceLang === 'ja') return [...normalized].length >= 3;
      const words = normalized.split(/\s+/).filter(Boolean);
      return words.length >= 2 || normalized.length >= 5;
    }

    function interimTranslationDelay() {
      return mobileQuery.matches ? 70 : 25;
    }

    async function translateText(text, sourceLang, targetLang, signal) {
      const sourceCode = lang(sourceLang).google;
      const targetCode = lang(targetLang).google;
      const key = `${sourceCode}:${targetCode}:${text}`;
      if (translationCache.has(key)) return translationCache.get(key);

      const url = new URL('https://translate.googleapis.com/translate_a/single');
      url.searchParams.set('client', 'gtx');
      url.searchParams.set('sl', sourceCode);
      url.searchParams.set('tl', targetCode);
      url.searchParams.set('dt', 't');
      url.searchParams.set('q', text);

      const res = await fetch(url, { signal });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      const translated = json?.[0]?.map((part) => part?.[0]).filter(Boolean).join('').trim();
      const value = translated || '(翻訳なし)';
      translationCache.set(key, value);
      return value;
    }

    function sendManual() {
      const text = manualText.value.trim();
      if (!text) return;
      manualText.value = '';
      handleTranscript(text, true);
    }

    function bindManualInput() {
      manualText.addEventListener('keydown', (event) => {
        if (event.key !== 'Enter' || event.shiftKey) return;
        event.preventDefault();
        sendManual();
      });
    }

    function bindDisplayScaleWatcher() {
      const refresh = () => applyDisplayScale(false);
      if (mobileQuery.addEventListener) {
        mobileQuery.addEventListener('change', refresh);
      } else if (mobileQuery.addListener) {
        mobileQuery.addListener(refresh);
      }
    }

    function loadDisplayScale() {
      let saved = null;
      try {
        saved = Number(localStorage.getItem('kosokuTranslatorScale'));
      } catch {}
      displayScale = clampNumber(Number.isFinite(saved) && saved > 0 ? saved : defaultDisplayScale(), 70, 110);
      applyDisplayScale(false);
    }

    function defaultDisplayScale() {
      return mobileQuery.matches ? 80 : 100;
    }

    function changeDisplayScale(delta) {
      displayScale = clampNumber(displayScale + delta, 70, 110);
      applyDisplayScale(true);
      try {
        localStorage.setItem('kosokuTranslatorScale', String(displayScale));
      } catch {}
    }

    function applyDisplayScale(showStatus) {
      const root = document.documentElement;
      const ratio = displayScale / 100;
      const mobile = mobileQuery.matches;
      const base = mobile
        ? {
            controlHeight: 34,
            mainMin: 54,
            selectMin: 66,
            iconMin: 34,
            buttonFont: 11.5,
            statusFont: 10.5,
            manualHeight: 32,
            manualFont: 12,
            bubbleMin: 16,
            bubbleVw: 5.2,
            bubbleMax: 27,
            bubblePadY: 7,
            bubblePadX: 8,
            paneHeadMin: 36,
            paneHeadPadY: 6,
            paneHeadPadX: 9,
            langMin: 18,
            langVw: 5,
            langMax: 24,
            feedGap: 6,
            feedPad: 8,
            dockGap: 5,
            dockPadY: 6,
            dockPadX: 6
          }
        : {
            controlHeight: 48,
            mainMin: 112,
            selectMin: 112,
            iconMin: 48,
            buttonFont: 13,
            statusFont: 13,
            manualHeight: 48,
            manualFont: 16,
            bubbleMin: 18,
            bubbleVw: 3,
            bubbleMax: 36,
            bubblePadY: 13,
            bubblePadX: 15,
            paneHeadMin: 58,
            paneHeadPadY: 12,
            paneHeadPadX: 18,
            langMin: 19,
            langVw: 2.7,
            langMax: 32,
            feedGap: 10,
            feedPad: 18,
            dockGap: 10,
            dockPadY: 12,
            dockPadX: 18
          };

      const px = (value) => `${Math.max(1, Math.round(value * ratio))}px`;
      const fixed = (value) => Number((value * ratio).toFixed(2));
      root.style.setProperty('--control-height', px(base.controlHeight));
      root.style.setProperty('--main-min', px(base.mainMin));
      root.style.setProperty('--select-min', px(base.selectMin));
      root.style.setProperty('--icon-min', px(base.iconMin));
      root.style.setProperty('--button-font', px(base.buttonFont));
      root.style.setProperty('--status-font', px(base.statusFont));
      root.style.setProperty('--manual-height', px(base.manualHeight));
      root.style.setProperty('--manual-font', px(base.manualFont));
      root.style.setProperty('--bubble-font', `clamp(${fixed(base.bubbleMin)}px, ${fixed(base.bubbleVw)}vw, ${fixed(base.bubbleMax)}px)`);
      root.style.setProperty('--bubble-pad-y', px(base.bubblePadY));
      root.style.setProperty('--bubble-pad-x', px(base.bubblePadX));
      root.style.setProperty('--pane-head-min', px(base.paneHeadMin));
      root.style.setProperty('--pane-head-pad-y', px(base.paneHeadPadY));
      root.style.setProperty('--pane-head-pad-x', mobile ? px(base.paneHeadPadX) : `clamp(${px(14)}, ${fixed(3)}vw, ${px(24)})`);
      root.style.setProperty('--lang-font', `clamp(${fixed(base.langMin)}px, ${fixed(base.langVw)}vw, ${fixed(base.langMax)}px)`);
      root.style.setProperty('--feed-gap', px(base.feedGap));
      root.style.setProperty('--feed-pad', mobile ? px(base.feedPad) : `clamp(${px(12)}, ${fixed(2.5)}vw, ${px(24)})`);
      root.style.setProperty('--dock-gap', px(base.dockGap));
      root.style.setProperty('--dock-pad-y', px(base.dockPadY));
      root.style.setProperty('--dock-pad-x', mobile ? px(base.dockPadX) : `clamp(${px(12)}, ${fixed(2.5)}vw, ${px(22)})`);
      scaleLabel.textContent = `${displayScale}%`;
      if (showStatus) setStatus(`表示サイズ: ${displayScale}%`);
    }

    function switchDirection() {
      if (listening) stopListening('翻訳方向を切り替えました');
      directionIndex = (directionIndex + 1) % DIRECTIONS.length;
      clearActiveTurn(false);
      renderDirection();
      realignFeedsForDirection();
      setStatus(`翻訳方向: ${direction().label}`);
    }

    function renderDirection() {
      const current = direction();
      const source = lang(current.source);
      const target = lang(current.target);

      directionButton.textContent = current.label;
      sourceName.textContent = source.name;
      targetName.textContent = target.name;
      sourceMode.textContent = '話す言語';
      targetMode.textContent = '翻訳結果';
      manualText.placeholder = source.inputPlaceholder;

      sourcePane.className = `pane ${source.pane}`;
      targetPane.className = `pane ${target.pane}`;
      resetEmptyText();
      setTimeout(warmTranslateConnection, 50);
    }

    function clearFeeds() {
      sourceFeed.innerHTML = `<div class="empty">${lang(direction().source).sourceEmpty}</div>`;
      targetFeed.innerHTML = `<div class="empty">${lang(direction().target).targetEmpty}</div>`;
      clearActiveTurn(true);
    }

    function realignFeedsForDirection() {
      const current = direction();
      const bubbles = [...sourceFeed.querySelectorAll('.bubble'), ...targetFeed.querySelectorAll('.bubble')];
      sourceFeed.innerHTML = '';
      targetFeed.innerHTML = '';

      bubbles.forEach((bubble) => {
        const languageId = bubble.lang === 'ja' ? 'ja' : 'en';
        const feed = languageId === current.source ? sourceFeed : targetFeed;
        feed.appendChild(bubble);
      });

      ensureFeedEmpty(sourceFeed, lang(current.source).sourceEmpty);
      ensureFeedEmpty(targetFeed, lang(current.target).targetEmpty);
      scrollBottom(sourceFeed);
      scrollBottom(targetFeed);
    }

    function resetEmptyText() {
      const sourceEmpty = sourceFeed.querySelector('.empty');
      const targetEmpty = targetFeed.querySelector('.empty');
      if (sourceEmpty) sourceEmpty.textContent = lang(direction().source).sourceEmpty;
      if (targetEmpty) targetEmpty.textContent = lang(direction().target).targetEmpty;
    }

    function addBubble(feed, stateClass, languageId) {
      removeEmpty(feed);
      const bubble = document.createElement('article');
      bubble.className = `bubble ${stateClass || ''}`;
      bubble.lang = languageId === 'ja' ? 'ja' : 'en';
      bubble.innerHTML = '<div class="bubble-text"></div>';
      feed.appendChild(bubble);
      scrollBottom(feed);
      return bubble;
    }

    function updateBubble(bubble, text) {
      if (!bubble) return;
      bubble.querySelector('.bubble-text').textContent = text;
    }

    function resetTargetRenderState(targetEl, generation = streamGeneration) {
      targetRenderState.set(targetEl, {
        generation,
        renderedSourceLength: 0,
        finalRequested: false,
        finalRendered: false,
        translating: false,
        pendingTranslation: null
      });
    }

    function ensureTargetRenderState(targetEl, generation = streamGeneration) {
      let state = targetRenderState.get(targetEl);
      if (!state || state.generation !== generation) {
        resetTargetRenderState(targetEl, generation);
        state = targetRenderState.get(targetEl);
      }
      return state;
    }

    function canRenderTranslation(targetEl, generation, text, final) {
      if (!targetEl || !targetEl.isConnected) return false;
      const state = targetRenderState.get(targetEl);
      if (!state || state.generation !== generation) return false;
      if (!final && state.finalRendered) return false;

      const sourceLength = text.trim().length;
      if (!final && !targetEl.classList.contains('pending') && sourceLength < state.renderedSourceLength) {
        return false;
      }

      return true;
    }

    function removeEmpty(feed) {
      const empty = feed.querySelector('.empty');
      if (empty) empty.remove();
    }

    function ensureFeedEmpty(feed, message) {
      if (feed.querySelector('.bubble')) return;
      feed.innerHTML = `<div class="empty">${message}</div>`;
    }

    function clearActiveTurn(abort = false) {
      clearTimeout(interimTimer);
      interimTimer = null;
      if (abort) streamGeneration += 1;
      activeTurn = null;
    }

    function scrollBottom(feed) {
      feed.scrollTop = feed.scrollHeight;
    }

    function switchEngine() {
      if (listening) stopListening('エンジンを切り替えました');
      if (engine === 'auto') {
        engine = deepgramAvailable ? 'deepgram' : 'browser';
      } else if (engine === 'deepgram') {
        engine = 'browser';
      } else {
        engine = 'auto';
      }
      renderEngine();
      setStatus(engine === 'browser' ? '標準モード: ブラウザ音声認識' : deepgramAvailable ? '高速モード: Deepgram' : '自動モード: 標準で待機');
    }

    function toggleHistory() {
      historyEnabled = !historyEnabled;
      workspace.classList.toggle('history-closed', !historyEnabled);
      workspace.classList.toggle('history-open', historyEnabled);
      historyButton.classList.toggle('on', historyEnabled);
      historyButton.textContent = historyEnabled ? '履歴ON' : '履歴';

      if (historyEnabled) {
        startHistoryTimer();
        saveHistorySnapshot(false);
        setStatus(`履歴ON: ${historyMinutes}分ごと`);
      } else {
        stopHistoryTimer();
        setStatus('履歴OFF');
      }
    }

    function changeHistoryInterval() {
      historyMinutes = Number(historyInterval.value);
      historyIntervalLabel.textContent = `${historyMinutes}分`;
      if (historyEnabled) startHistoryTimer();
      setStatus(`履歴間隔: ${historyMinutes}分`);
    }

    function startHistoryTimer() {
      stopHistoryTimer();
      historyTimer = setInterval(() => saveHistorySnapshot(false), historyMinutes * 60 * 1000);
    }

    function stopHistoryTimer() {
      if (historyTimer) clearInterval(historyTimer);
      historyTimer = null;
    }

    function saveHistorySnapshot(force) {
      const newTurns = conversationTurns.slice(lastHistoryTurnIndex);
      const turns = newTurns
        .map((turn) => ({
          at: turn.at,
          japanese: japaneseFromTurn(turn)
        }))
        .filter((turn) => turn.japanese);

      if (!turns.length) {
        if (force || historyEnabled) setStatus('保存する会話がまだありません');
        return;
      }

      const snapshot = {
        at: Date.now(),
        range: `${historyMinutes}分`,
        turns
      };
      historySnapshots.unshift(snapshot);
      historySnapshots = historySnapshots.slice(0, 50);
      lastHistoryTurnIndex = conversationTurns.length;
      saveHistoryToStorage();
      renderHistory();
      setStatus(`履歴を保存しました: ${formatTime(snapshot.at)}`);
    }

    function renderHistory() {
      if (!historySnapshots.length) {
        historyList.innerHTML = '<div class="history-empty">履歴をONにすると、日本語だけ指定した間隔で残します</div>';
        return;
      }

      historyList.innerHTML = historySnapshots.map((snapshot) => {
        const lines = snapshot.turns.map((turn) => `
          <p class="history-line">${escapeHtml(japaneseFromTurn(turn))}</p>
        `).join('');

        return `
          <section class="history-item">
            <div class="history-time">${formatTime(snapshot.at)} / ${escapeHtml(snapshot.range)}</div>
            ${lines}
          </section>
        `;
      }).join('');
    }

    function japaneseFromTurn(turn) {
      if (turn.japanese) return turn.japanese;
      if (turn.sourceLang === 'ja') return turn.source || '';
      if (turn.targetLang === 'ja') return turn.target || '';
      if (turn.direction === '英語→日本語') return turn.target || '';
      if (turn.direction === '日本語→英語') return turn.source || '';
      return turn.target || turn.source || '';
    }

    function loadHistory() {
      try {
        const raw = localStorage.getItem('kosokuTranslatorHistory');
        historySnapshots = raw ? JSON.parse(raw) : [];
      } catch {
        historySnapshots = [];
      }
    }

    function saveHistoryToStorage() {
      try {
        localStorage.setItem('kosokuTranslatorHistory', JSON.stringify(historySnapshots));
      } catch {}
    }

    function formatTime(value) {
      const date = new Date(value);
      return date.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function direction() {
      return DIRECTIONS[directionIndex];
    }

    function lang(id) {
      return LANGS[id];
    }

    function clampNumber(value, min, max) {
      return Math.min(max, Math.max(min, value));
    }

    function warmTranslateConnection() {
      const current = direction();
      translateText(current.source === 'ja' ? 'はい' : 'yes', current.source, current.target).catch(() => {});
    }

    function setStatus(message) {
      statusEl.innerHTML = message;
    }
  </script>
</body>
</html>
